name: Update subscriptions from v2fly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    paths:
      - "sources/config.json"
      - "scripts/build.py"
      - ".github/workflows/update-subscriptions.yml"

permissions:
  contents: write

concurrency:
  group: update-subscriptions
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate subscriptions
        run: python scripts/build.py

      - name: Show generated files
        run: |
          wc -l subscriptions/*.txt
          git diff -- subscriptions/

      - name: Commit changes
        run: |
          if git diff --quiet -- subscriptions; then
            echo "v2fly lists have not changed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subscriptions
          git commit -m "chore: update subscriptions from v2fly"
          git push
